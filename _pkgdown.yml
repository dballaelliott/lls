url: https://dballaelliott.github.io/lls/
template:
  bootstrap: 5
  bslib:
    base_font:
      google: Source Sans 3
    heading_font:
      google: Source Sans 3
    code_font:
      google: Source Code Pro
  bootswatch: flatly
  includes:
    in_header: |
      <!-- Global site tag (gtag.js) - Google Analytics -->
      <script async src="https://www.googletagmanager.com/gtag/js?id={YOUR TRACKING ID}"#' ></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', '{YOUR TRACKING ID}');
      </script>
authors:
  Dylan Balla-Elliott:
    href: https://www.dballaelliott.com
footer:
  structure:
    left: developed_by
    right: built_with
development:
  mode: unreleased

